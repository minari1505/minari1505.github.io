# ---------------------------------------------------------------
# 사이트 기본 설정
# ---------------------------------------------------------------
minimal_mistakes_skin : "default"   # 스킨 (색감은 assets/css/main.scss에서 파스텔로 덮어씀)
remote_theme          : "mmistakes/minimal-mistakes"

locale                : "ko-KR"
title                 : "minari archive"
title_separator       : "·"
subtitle              : ""
name                  : "minari"
description           : "논문 정리와 강의 필기를 차곡차곡 기록하는 공간"
url                   : "https://minari1505.github.io"
repository            : "minari1505/minari1505.github.io"

# 검색
search                : true
search_full_content   : true

# ---------------------------------------------------------------
# 저자 프로필 (사이드바)
# ---------------------------------------------------------------
author:
  name    : "minari"
  avatar  : "/assets/images/avatar.jpg"
  bio      : "논문과 강의를 정리하는 중"
  location : "Seoul"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/minari1505"

# 하단 푸터 링크
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/minari1505"

# ---------------------------------------------------------------
# 빌드 설정
# ---------------------------------------------------------------
markdown: kramdown
highlighter: rouge
paginate: 5
paginate_path: /page:num/
timezone: Asia/Seoul

include:
  - _pages

# 강의 정리 — 레슨 컬렉션 (/courses/<강의>/<레슨>/)
collections:
  lessons:
    output: true
    permalink: /courses/:path/

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# ---------------------------------------------------------------
# 글/페이지 기본값
# ---------------------------------------------------------------
defaults:
  # _posts — 모든 글
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true
      show_date: true
  # _pages — 모든 페이지
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true
  # _lessons — 강의 레슨 페이지
  - scope:
      path: ""
      type: lessons
    values:
      layout: lesson
      author_profile: false

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# 정리에 안 넣을 파일
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
